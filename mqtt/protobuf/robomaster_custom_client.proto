syntax = "proto3";
package robomaster.custom_client;
// 版本声明：对应 RoboMaster 2026 机甲大师高校系列赛通信协议 V1.2.0
// 用途：自定义客户端与服务器/机器人的 MQTT 通信数据结构定义
// 编译说明：需使用 Protobuf v3 编译器（protoc）生成目标语言代码
// 通信协议：基于 MQTT 3.1.1，服务器 IP：192.168.12.1，端口：3333

// 1. 键鼠遥控（KeyboardMouseControl）
// 用途：自定义客户端向服务器发送鼠标、键盘输入数据
// 发送方：自定义客户端
// 接收者：服务器→图传链路→机器人
// 最高QoS等级：1
// 发送频率：75Hz
message KeyboardMouseControl {
  int32 mouse_x = 1; // 鼠标X轴移动速度（单位：像素/帧），负值表示向左移动，正值表示向右移动
  int32 mouse_y = 2; // 鼠标Y轴移动速度（单位：像素/帧），负值表示向下移动，正值表示向上移动
  int32 mouse_z = 3; // 鼠标滚轮移动速度（单位：格/帧），负值表示向后滚动，正值表示向前滚动
  bool left_button_down = 4; // 鼠标左键状态：false=抬起，true=按下
  bool right_button_down = 5; // 鼠标右键状态：false=抬起，true=按下
  uint32 keyboard_value = 6; // 键盘按键位掩码（每个bit对应一个按键，0=未按下，1=按下），支持的按键包括：
                             // bit0=W, bit1=S, bit2=A, bit3=D, bit4=Shift, bit5=Ctrl,
                             // bit6=Q, bit7=E, bit8=R, bit9=F, bit10=G, bit11=Z,
                             // bit12=X, bit13=C, bit14=V, bit15=B（仅bit0-bit15有效）
  bool mid_button_down = 7; // 鼠标中键状态：false=抬起，true=按下
}

// 2. 自定义控制数据（CustomControl）
// 用途：自定义客户端向服务器发送最大30字节的自定义二进制指令
// 发送方：自定义客户端
// 接收者：服务器→图传链路→机器人（对应常规链路0x0311命令字）
// 最高QoS等级：1
// 发送频率：75Hz
message CustomControl {
  bytes data = 1; // 自定义二进制数据，最大长度30字节（超过30字节将被服务器拒收）
}

// 3. 比赛全局状态（GameStatus）
// 用途：服务器向自定义客户端同步比赛全局信息（局数、比分、阶段等）
// 发送方：服务器
// 接收者：自定义客户端
// 最高QoS等级：1
// 发送频率：5Hz
message GameStatus {
  uint32 current_round = 1; // 当前局号，从1开始递增（如1=第一局，2=第二局）
  uint32 total_rounds = 2; // 比赛总局数（如BO3赛制为3，BO5赛制为5）
  uint32 red_score = 3; // 红方当前总得分，初始值0，按比赛规则累加
  uint32 blue_score = 4; // 蓝方当前总得分，初始值0，按比赛规则累加
  uint32 current_stage = 5; // 当前比赛阶段，枚举值：
                            // 0 = 未开始比赛（赛前准备阶段）
                            // 1 = 准备阶段（选手就位，设备检查）
                            // 2 = 十五秒裁判系统自检阶段（裁判系统自动校验设备连接）
                            // 3 = 五秒倒计时（比赛即将开始）
                            // 4 = 比赛中（正常竞技阶段）
                            // 5 = 比赛结算中（统计比分、判定胜负）
                            // 6 = 比赛暂停（如设备故障、规则争议时）
  int32 stage_countdown_sec = 6; // 当前阶段剩余时间（单位：秒），倒计时结束后进入下一阶段
  int32 stage_elapsed_sec = 7; // 当前阶段已过时间（单位：秒），从阶段开始时累计
  bool is_paused = 8; // 比赛是否暂停：false=正常进行，true=暂停（与current_stage=6状态一致）
}

// 4. 基地、前哨站及机器人全局状态（GlobalUnitStatus）
// 用途：服务器向自定义客户端同步双方基地、前哨站及所有机器人的核心状态
// 发送方：服务器
// 接收者：自定义客户端
// 最高QoS等级：1
// 发送频率：1Hz
message GlobalUnitStatus {
  uint32 base_health = 1; // 己方基地当前血量（单位：点），0表示基地已被摧毁
  uint32 base_status = 2; // 己方基地状态，枚举值：
                          // 0 = 无敌（仅赛前保护阶段，比赛开始后自动解除，无法被攻击）
                          // 1 = 解除无敌，护甲未展开（可被攻击，防御较低）
                          // 2 = 解除无敌，护甲展开（可被攻击，防御较高）
  uint32 base_shield = 3; // 己方基地当前护盾值（单位：点），0表示无护盾，护盾优先于血量扣除
  uint32 outpost_health = 4; // 己方前哨站当前血量（单位：点），0表示前哨站已被摧毁
  uint32 outpost_status = 5; // 己方前哨站状态，枚举值：
                             // 0 = 无敌（仅赛前保护阶段，无法被攻击）
                             // 1 = 存活，解除无敌，中部装甲旋转（防御均衡，可攻击）
                             // 2 = 存活，解除无敌，中部装甲停转（防御下降，可攻击）
                             // 3 = 被击毁，不可重建（比赛剩余时间内无法恢复）
                             // 4 = 被击毁，可重建（满足重建条件后自动恢复）
                             // 5 = 被击毁，重建中（处于重建流程，尚未完成）
  uint32 enemy_base_health = 6; // 对方基地当前血量（单位：点），0表示基地已被摧毁
  uint32 enemy_base_status = 7; // 对方基地状态，枚举值同己方base_status
  uint32 enemy_base_shield = 8; // 对方基地当前护盾值（单位：点），0表示无护盾
  uint32 enemy_outpost_health = 9; // 对方前哨站当前血量（单位：点），0表示前哨站已被摧毁
  uint32 enemy_outpost_status = 10; // 对方前哨站状态，枚举值同己方outpost_status
  repeated uint32 robot_health = 11; // 所有机器人当前血量（单位：点），数组顺序：
                                     // 己方机器人（按ID升序：1=英雄→2=工程→3/4/5=步兵→6=空中→7=哨兵...）→
                                     // 对方机器人（按ID升序：101=英雄→102=工程→103/104/105=步兵...）
                                     // 未上场或被罚下的机器人，血量值为0
  repeated int32 robot_bullets = 12; // 己方各机器人剩余累计发弹量（单位：发），与robot_health数组己方部分一一对应
  uint32 total_damage_ally = 13; // 己方累计造成的总伤害（单位：点），所有己方机器人伤害之和
  uint32 total_damage_enemy = 14; // 对方累计造成的总伤害（单位：点），所有对方机器人伤害之和
}

// 5. 全局后勤信息（GlobalLogisticsStatus）
// 用途：服务器向自定义客户端同步己方经济、科技、加密等级等后勤数据
// 发送方：服务器
// 接收者：自定义客户端
// 最高QoS等级：1
// 发送频率：1Hz
message GlobalLogisticsStatus {
  uint32 remaining_economy = 1; // 己方当前剩余经济（单位：金币），用于兑换复活、补弹、增益等功能
  uint64 total_economy_obtained = 2; // 己方比赛累计获得的总经济（单位：金币），初始值0，按规则累加
  uint32 tech_level = 3; // 己方科技等级，由工程机器人曾装配的最高难度任务决定，初始值0，难度越高等级越高
  uint32 encryption_level = 4; // 己方加密等级（即对方干扰波难度等级），初始值1，最高为3，等级越高对方破解难度越大
}

// 6. 全局特殊机制（GlobalSpecialMechanism）
// 用途：服务器向自定义客户端同步当前生效的全局特殊机制及持续时间
// 发送方：服务器
// 接收者：自定义客户端
// 最高QoS等级：1
// 发送频率：1Hz
message GlobalSpecialMechanism {
  repeated uint32 mechanism_id = 1; // 正在生效的特殊机制ID，枚举值：
                                    // 1 = 己方堡垒被对方占领计时（对方占领己方堡垒后触发）
                                    // 2 = 对方堡垒被己方占领计时（己方占领对方堡垒后触发）
  repeated int32 mechanism_time_sec = 2; // 对应机制的剩余持续时间（单位：秒），与mechanism_id数组索引一一对应
                                         // 时间为0时表示机制失效，从数组中移除
}

// 7. 全局事件通知（Event）
// 用途：服务器向自定义客户端推送全局关键事件（击杀、摧毁、激活等）
// 发送方：服务器
// 接收者：自定义客户端
// 最高QoS等级：1
// 发送方式：触发式发送（事件发生时立即发送）
message Event {
  int32 event_id = 1; // 事件编号，枚举值及对应说明：
                      // 1 = 击杀事件（参数格式：击杀者ID+被击毁机器人ID，无分隔符，如"1103"表示红方英雄击毁蓝方3号步兵）
                      // 2 = 基地/前哨站被摧毁事件（参数为被摧毁目标ID，如"11"=红方基地，"110"=蓝方前哨站）
                      // 3 = 能量机关可激活次数变化（参数为变化后可激活次数，如"2"表示剩余2次激活机会）
                      // 4 = 能量机关当前可进入正在激活状态（无参数值，参数字段为空字符串）
                      // 5 = 能量机关激活结果（参数格式：激活成功灯臂数量+平均环数，无分隔符，如"385"表示3个灯臂激活成功，平均环数85）
                      // 6 = 能量机关被激活（参数为激活类型，如"1"=常规激活，"2"=快速激活）
                      // 7 = 己方英雄进入部署模式（无参数值，参数字段为空字符串）
                      // 8 = 己方英雄造成狙击伤害（参数为累计狙击伤害值，如"500"表示累计造成500点狙击伤害）
                      // 9 = 对方英雄造成狙击伤害（参数为累计狙击伤害值，如"300"表示对方累计造成300点狙击伤害）
                      // 10 = 己方呼叫空中支援（无参数值，参数字段为空字符串）
                      // 11 = 己方空中支援被打断（参数为对方剩余可打断次数，如"1"表示对方还能打断1次）
                      // 12 = 对方呼叫空中支援（无参数值，参数字段为空字符串）
                      // 13 = 对方空中支援被打断（参数为己方剩余可打断次数，如"2"表示己方还能打断2次）
                      // 14 = 飞镖命中（参数为命中目标类型，1=前哨站，2=基地固定目标，3=基地随机固定目标，4=基地随机移动目标，5=基地末端移动目标）
                      // 15 = 飞镖闸门开启（参数为开启方，1=己方闸门开启，2=对方闸门开启）
                      // 16 = 己方基地遭到攻击（无参数值，参数字段为空字符串，触发间隔≥5秒）
                      // 17 = 前哨站停转（参数为停转方，1=己方前哨站停转，2=对方前哨站停转）
                      // 18 = 基地护甲展开（参数为展开方，1=己方基地护甲展开，2=对方基地护甲展开）
  string param = 2; // 事件参数，格式随event_id变化，具体说明见event_id枚举注释
}

// 8. 机器人单次存活累计受伤统计（RobotInjuryStat）
// 用途：服务器向自定义客户端同步单个机器人一次存活期间的受伤明细
// 发送方：服务器
// 接收者：自定义客户端
// 最高QoS等级：1
// 发送频率：1Hz
message RobotInjuryStat {
  uint32 total_damage = 1; // 该机器人本次存活期间累计受伤总量（单位：点），所有伤害类型之和
  uint32 collision_damage = 2; // 撞击伤害（单位：点），与其他机器人或场地障碍物碰撞造成的伤害
  uint32 small_projectile_damage = 3; // 17mm弹丸伤害（单位：点），被对方17mm弹丸击中造成的伤害
  uint32 large_projectile_damage = 4; // 42mm弹丸伤害（单位：点），被对方42mm弹丸击中造成的伤害
  uint32 dart_splash_damage = 5; // 飞镖溅射伤害（单位：点），被对方飞镖击中或溅射造成的伤害
  uint32 module_offline_damage = 6; // 模块离线扣血（单位：点），装甲、电容等模块离线导致的持续扣血
  uint32 offline_damage = 7; // 异常离线扣血（单位：点），WiFi通信中断等异常离线导致的持续扣血
  uint32 penalty_damage = 8; // 判罚扣血（单位：点），违反比赛规则被裁判系统判罚的扣血
  uint32 server_kill_damage = 9; // 服务器强制战亡扣血（单位：点），因特殊规则被服务器判定直接战亡的扣血
  uint32 killer_id = 10; // 击杀者ID（造成该机器人战亡的主体ID），0表示未检测到击杀者（如自然扣血战亡）
}

// 9. 机器人复活状态（RobotRespawnStatus）
// 用途：服务器向自定义客户端同步单个机器人的复活相关状态
// 发送方：服务器
// 接收者：自定义客户端
// 最高QoS等级：1
// 发送频率：1Hz
message RobotRespawnStatus {
  bool is_pending_respawn = 1; // 是否处于待复活状态：false=未战亡/已复活，true=战亡待复活
  uint32 total_respawn_progress = 2; // 复活所需总读条进度（单位：进度值），固定为100（满进度为100）
  uint32 current_respawn_progress = 3; // 当前复活读条进度（单位：进度值），从0递增至total_respawn_progress，满进度后复活
  bool can_free_respawn = 4; // 是否可以免费复活：false=需消耗金币，true=免费复活（满足免费复活条件）
  uint32 gold_cost_for_respawn = 5; // 金币复活所需消耗的金币数量，can_free_respawn为false时生效
  bool can_pay_for_respawn = 6; // 是否允许金币复活：false=不可用金币复活，true=可用金币复活（金币足够时）
}

// 10. 机器人固定属性配置（RobotStaticStatus）
// 用途：服务器向自定义客户端同步机器人的固定硬件属性和配置信息
// 发送方：服务器
// 接收者：自定义客户端
// 最高QoS等级：1
// 发送频率：1Hz
message RobotStaticStatus {
  uint32 connection_state = 1; // 机器人与裁判系统的连接状态：0=未连接，1=已连接
  uint32 field_state = 2; // 机器人上场状态：0=已上场（在比赛场地内），1=未上场（未进入场地/被罚下）
  uint32 alive_state = 3; // 机器人存活状态：0=未知（连接异常），1=存活（正常运行），2=战亡（血量为0）
  uint32 robot_id = 4; // 机器人唯一ID（详见协议附录二），枚举值：
                       // 红方：1=英雄，2=工程，3/4/5=步兵，6=空中，7=哨兵，8=飞镖，9=雷达，10=前哨站，11=基地
                       // 蓝方：101=英雄，102=工程，103/104/105=步兵，106=空中，107=哨兵，108=飞镖，109=雷达，110=前哨站，111=基地
  uint32 robot_type = 5; // 机器人类型，枚举值：1=英雄机器人，2=工程机器人，3=步兵机器人，4=空中机器人，5=哨兵机器人，6=飞镖机器人，7=雷达机器人，8=前哨站，9=基地
  uint32 performance_system_shooter = 6; // 发射机构性能体系，枚举值：
                                         // 1 = 冷却优先（射击热量冷却速度快，爆发低）
                                         // 2 = 爆发优先（单发伤害高，冷却速度慢）
                                         // 3 = 英雄近战优先（适配近战场景，射程近、射速快）
                                         // 4 = 英雄远程优先（适配远程场景，射程远、伤害高）
  uint32 performance_system_chassis = 7; // 底盘性能体系，枚举值：
                                         // 1 = 血量优先（底盘血量高，防御强）
                                         // 2 = 功率优先（底盘功率大，移动速度快）
                                         // 3 = 英雄近战优先（近战机动性强，转向快）
                                         // 4 = 英雄远程优先（远程稳定性强，抗干扰）
  uint32 level = 8; // 机器人当前等级，初始值1，通过积累经验升级
  uint32 max_health = 9; // 机器人最大血量（单位：点），等级越高最大血量越高
  uint32 max_heat = 10; // 发射机构最大热量（单位：点），超过后无法射击，需冷却
  float heat_cooldown_rate = 11; // 发射机构热量冷却速率（单位：点/秒），每秒自动冷却的热量值
  uint32 max_power = 12; // 底盘最大功率（单位：W），决定移动速度上限
  uint32 max_buffer_energy = 13; // 最大缓冲能量（单位：J），用于技能释放、应急供电
  uint32 max_chassis_energy = 14; // 最大底盘能量（单位：J），决定持续移动能力
}

// 11. 机器人实时动态数据（RobotDynamicStatus）
// 用途：服务器向自定义客户端同步机器人的实时运行数据（血量、热量、弹药等）
// 发送方：服务器
// 接收者：自定义客户端
// 最高QoS等级：1
// 发送频率：10Hz
message RobotDynamicStatus {
  uint32 current_health = 1; // 机器人当前血量（单位：点），低于0时判定为战亡
  float current_heat = 2; // 发射机构当前热量（单位：点），超过max_heat时无法射击
  float last_projectile_fire_rate = 3; // 上一次射击的弹丸射速（单位：Hz），即每秒发射的弹丸数量
  uint32 current_chassis_energy = 4; // 底盘当前剩余能量（单位：J），低于阈值时移动速度下降
  uint32 current_buffer_energy = 5; // 当前缓冲能量（单位：J），用于技能释放
  uint32 current_experience = 6; // 机器人当前经验值，积累至upgrade_experience后升级
  uint32 experience_for_upgrade = 7; // 升级所需经验值，等级越高所需经验越多
  uint32 total_projectiles_fired = 8; // 累计已发射弹丸数量（单位：发），从比赛开始时累计
  uint32 remaining_ammo = 9; // 剩余允许发弹量（单位：发），为0时无法射击，需补弹
  bool is_out_of_combat = 10; // 是否处于脱战状态：false=战斗中（近期有攻击/受击），true=脱战（近期无攻击/受击）
  uint32 out_of_combat_countdown = 11; // 脱战状态倒计时（单位：秒，固定为5秒），脱战后开始倒计时，倒计时结束后每秒恢复血量上限的5%
  bool can_remote_heal = 12; // 是否可以远程补血：false=不可远程补血，true=可通过金币兑换远程补血
  bool can_remote_ammo = 13; // 是否可以远程补弹：false=不可远程补弹，true=可通过金币兑换远程补弹
}

// 12. 机器人各模块运行状态（RobotModuleStatus）
// 用途：服务器向自定义客户端同步机器人各硬件模块的在线状态
// 发送方：服务器
// 接收者：自定义客户端
// 最高QoS等级：1
// 发送频率：1Hz
message RobotModuleStatus {
  uint32 power_manager = 1; // 电源管理模块状态：0=离线，1=在线，2=因安装不规范被视为离线
  uint32 rfid = 2; // RFID模块状态：0=离线，1=在线，2=因安装不规范被视为离线
  uint32 light_strip = 3; // 灯条模块状态：0=离线，1=在线，2=因安装不规范被视为离线
  uint32 small_shooter = 4; // 17mm发射机构状态：0=离线，1=在线，2=因安装不规范被视为离线
  uint32 big_shooter = 5; // 42mm发射机构状态：0=离线，1=在线，2=因安装不规范被视为离线
  uint32 uwb = 6; // 定位模块（UWB）状态：0=离线，1=在线，2=因安装不规范被视为离线
  uint32 armor = 7; // 装甲模块状态：0=离线，1=在线，2=因安装不规范被视为离线
  uint32 video_transmission = 8; // 图传模块状态：0=离线，1=在线，2=因安装不规范被视为离线
  uint32 capacitor = 9; // 电容模块状态：0=离线，1=在线，2=因安装不规范被视为离线
  uint32 main_controller = 10; // 主控模块状态：0=离线，1=在线，2=因安装不规范被视为离线
  uint32 laser_detection_module = 11; // 激光检测模块状态：0=离线，1=在线，2=因安装不规范被视为离线
}

// 13. 机器人空间坐标与朝向（RobotPosition）
// 用途：服务器向自定义客户端同步机器人的实时空间位置和朝向
// 发送方：服务器
// 接收者：自定义客户端
// 最高QoS等级：1
// 发送频率：1Hz
message RobotPosition {
  float x = 1; // 世界坐标X轴（单位：米），原点=红方补给站附近场地围挡交点，沿场地长边向蓝方为正方向
  float y = 2; // 世界坐标Y轴（单位：米），沿场地短边向红方停机坪为正方向
  float z = 3; // 世界坐标Z轴（单位：米），垂直场地向上为正方向（地面机器人Z值接近0，空中机器人Z值为高度）
  float yaw = 4; // 机器人朝向（单位：度），正北方向为0度，顺时针递增（如90度=正东，180度=正南）
}

// 14. Buff效果信息（Buff）
// 用途：服务器向自定义客户端同步机器人获得的增益/减益效果
// 发送方：服务器
// 接收者：自定义客户端
// 最高QoS等级：1
// 发送方式：获得增益时触发发送，此后1Hz定频发送，直至Buff消失
message Buff {
  uint32 robot_id = 1; // 获得Buff的机器人ID（详见协议附录二的机器人ID定义）
  uint32 buff_type = 2; // Buff类型，枚举值：
                        // 1 = 攻击增益（提升武器伤害）
                        // 2 = 防御增益（降低受到的伤害）
                        // 3 = 射击热量冷却增益（提升热量冷却速度）
                        // 4 = 底盘功率增益（提升移动速度）
                        // 5 = 回血增益（每秒自动恢复血量）
                        // 6 = 可兑换允许发弹量（增加最大允许发弹量）
                        // 7 = 地形跨越增益（预备）（检测到飞坡前半部分场地交互模块，未获得实际增益）
  int32 buff_level = 3; // Buff增益值，含义随buff_type变化：
                        // 攻击/防御/回血/底盘功率增益：百分比（如10=10%，50=50%）
                        // 热量冷却增益：直接值（如5=冷却速度+5点/秒）
                        // 可兑换发弹量：发数（如20=增加20发允许发弹量）
                        // 默认值0，表示无增益
  uint32 buff_max_time = 4; // Buff最大持续时间（单位：秒），Buff生效时的总持续时间
  uint32 buff_left_time = 5; // Buff剩余持续时间（单位：秒），倒计时为0时Buff失效
}

// 15. 判罚信息（PenaltyInfo）
// 用途：服务器向自定义客户端同步机器人的判罚记录
// 发送方：服务器
// 接收者：自定义客户端
// 最高QoS等级：1
// 发送方式：触发式发送（判罚发生时立即发送）
message PenaltyInfo {
  uint32 penalty_type = 1; // 判罚类型，枚举值：
                           // 1 = 黄牌（轻度违规警告）
                           // 2 = 双方黄牌（双方均有违规）
                           // 3 = 红牌（严重违规，机器人被罚下，红牌累计2次将导致队伍判负）
                           // 4 = 超功率（底盘功率超过上限）
                           // 5 = 超热量（发射机构热量超过上限）
                           // 6 = 超射速（射击频率超过上限）
  uint32 penalty_effect_sec = 2; // 判罚效果持续时间（单位：秒），红牌为永久（值为0表示直至比赛结束）
  uint32 total_penalty_num = 3; // 当前累计判罚次数，同一类型判罚多次累加
}

// 16. 哨兵轨迹规划信息（RobotPathPlanInfo）
// 用途：服务器向自定义客户端同步哨兵机器人的轨迹规划数据
// 发送方：服务器
// 接收者：自定义客户端
// 最高QoS等级：1
// 发送频率：1Hz
message RobotPathPlanInfo {
  uint32 intention = 1; // 哨兵机器人意图，枚举值：1=攻击（前往目标点攻击），2=防御（前往目标点防守），3=移动（仅移动至目标点）
  uint32 start_pos_x = 2; // 轨迹起始点X坐标（单位：分米），小地图左下角为原点，水平向右为X轴正方向
  uint32 start_pos_y = 3; // 轨迹起始点Y坐标（单位：分米），竖直向上为Y轴正方向
  repeated int32 offset_x = 4 [packed = true]; // X轴增量数组，共49个元素，每个元素范围-128~+127（单位：分米）
                                               // 增量相对于上一个点位计算，与offset_y数组元素一一对应组成路径点
  repeated int32 offset_y = 5 [packed = true]; // Y轴增量数组，共49个元素，每个元素范围-128~+127（单位：分米）
  uint32 sender_id = 6; // 发送方ID（即哨兵机器人ID，红方=7，蓝方=107）
}

// 17. 云台手地图点击标记（MapClickInfoNotify）
// 用途：自定义客户端向服务器发送云台手的地图点击标记指令
// 发送方：自定义客户端
// 接收者：服务器
// 最高QoS等级：1
// 发送方式：触发式发送，频率限制与选手端下发数据一致（云台手间隔≥0.5秒，半自动操作手间隔≥3秒）
message MapClickInfoNotify {
  uint32 is_send_all = 1; // 指令发送范围，枚举值：
                          // 0 = 指定客户端（仅发送给robot_id列表中的机器人）
                          // 1 = 除哨兵外的己方机器人
                          // 2 = 包含哨兵的所有己方机器人
  bytes robot_id = 2; // 目标机器人ID列表，固定7字节长度：
                      // 红方填写机器人ID（1=英雄，2=工程，3/4/5=步兵等），蓝方填写对应蓝方ID（101=英雄，102=工程等）
                      // 未指定的机器人ID填0，如红方发送给英雄和工程机器人，填充为0x01,0x02,0x00,0x00,0x00,0x00,0x00
  uint32 mode = 3; // 标记类型，枚举值：1=攻击（标记目标点/机器人为攻击目标），2=防御（标记目标点为防御位置），3=警戒（标记区域为警戒范围），4=自定义（自定义标记用途）
  uint32 enemy_id = 4; // 标定的对方机器人ID（仅mode=2时有效），0表示未标定对方机器人
  uint32 ascii = 5; // 自定义图标ASCII码（仅mode=4时有效）
  uint32 type = 6; // 标记模式，枚举值：1=地图标记（标记地图坐标点），2=对方机器人标记（标记对方特定机器人）
  uint32 screen_x = 7; // 屏幕坐标X（单位：像素），赛事客户端分辨率1920×1080，左上角为(0,0)
  uint32 screen_y = 8; // 屏幕坐标Y（单位：像素）
  float map_x = 9; // 地图坐标X（单位：米），仅type=1时有效
  float map_y = 10; // 地图坐标Y（单位：米），仅type=1时有效
}

// 18. 雷达发送的机器人位置信息（RadarInfoToClient）
// 用途：服务器向自定义客户端同步雷达探测到的对方机器人位置信息
// 发送方：服务器
// 接收者：自定义客户端
// 最高QoS等级：1
// 发送频率：1Hz
message RadarInfoToClient {
  uint32 target_robot_id = 1; // 目标机器人ID（对方机器人ID，如101=蓝方英雄，3=红方3号步兵）
  float target_pos_x = 2; // 目标机器人X坐标（单位：米），基于场地坐标系
  float target_pos_y = 3; // 目标机器人Y坐标（单位：米），基于场地坐标系
  float toward_angle = 4; // 目标机器人朝向角度（单位：度），正北为0度，顺时针递增
  uint32 is_high_light = 5; // 目标机器人是否被特殊标识：0=否，1=是，2=是但目标定位模块离线（坐标数据可能不准确）
}

// 19. 自定义数据流（CustomByteBlock）
// 用途：机器人向自定义客户端发送自定义二进制数据（对应串口协议0x0310指令）
// 发送方：机器人→图传链路→自定义客户端
// 接收者：自定义客户端
// 最高QoS等级：1
// 发送频率：50Hz（无重传机制，丢失后需依赖下一次发送）
message CustomByteBlock {
  bytes data = 1; // 自定义二进制数据包，最大长度2.4kbit（300字节），用于传输机器人自定义传感器数据、状态信息等
}

// 20. 工程装配指令（AssemblyCommand）
// 用途：自定义客户端向服务器发送工程机器人的装配操作指令
// 发送方：自定义客户端
// 接收者：服务器
// 最高QoS等级：1
// 发送频率：1Hz
message AssemblyCommand {
  uint32 operation = 1; // 装配操作类型，枚举值：1=确认装配（执行选中难度的装配任务），2=取消装配（终止当前装配任务）
  uint32 difficulty = 2; // 选中的装配难度等级，1=简单，2=中等，3=困难，4=专家（需与科技核心支持的难度匹配）
}

// 21. 科技核心运动状态同步（TechCoreMotionStateSync）
// 用途：服务器向自定义客户端同步科技核心的装配状态
// 发送方：服务器
// 接收者：自定义客户端
// 最高QoS等级：1
// 发送频率：1Hz
message TechCoreMotionStateSync {
  uint32 maximum_difficulty_level = 1; // 当前可选择的最高装配难度等级（1~4），由工程机器人当前科技等级决定
  uint32 status = 2; // 科技核心状态，枚举值：
                     // 1 = 未进入装配状态（初始状态，未选择装配难度）
                     // 2 = 已选择装配难度，科技核心移动中（前往装配位置）
                     // 3 = 科技核心移动完成，可进行首个装配步骤
                     // 4 = 上一个装配步骤已完成，可进行下一个装配步骤
                     // 5 = 所有装配步骤已完成（装配成功）
                     // 6 = 已确认装配，科技核心移动中（装配完成后返回初始位置）
  uint32 enemy_core_status = 3; // 对方科技核心状态（仅己方四级装配可用时有效）：0=对方无装配，1=对方装配非四级，2=对方装配四级
  uint32 remain_time_all = 4; // 己方装配总剩余时长（单位：秒），仅己方正在四级装配时有效
  uint32 remain_time_step = 5; // 己方单个步骤装配间隔剩余时长（单位：秒），仅己方正在四级装配时有效
}

// 22. 步兵/英雄性能体系选择指令（RobotPerformanceSelectionCommand）
// 用途：自定义客户端向服务器发送步兵/英雄/哨兵的性能体系及控制方式选择指令
// 发送方：自定义客户端
// 接收者：服务器
// 最高QoS等级：1
// 发送频率：1Hz
message RobotPerformanceSelectionCommand {
  uint32 shooter = 1; // 发射机构性能体系，枚举值：1=冷却优先，2=爆发优先，3=英雄近战优先，4=英雄远程优先（需与机器人类型匹配）
  uint32 chassis = 2; // 底盘性能体系，枚举值：1=血量优先，2=功率优先，3=英雄近战优先，4=英雄远程优先（需与机器人类型匹配）
  uint32 sentry_control = 3; // 哨兵控制方式，枚举值：0=自动控制，1=半自动控制（仅对哨兵机器人生效，其他机器人忽略）
}

// 23. 步兵/英雄性能体系状态同步（RobotPerformanceSelectionSync）
// 用途：服务器向自定义客户端同步步兵/英雄/哨兵的当前性能体系及控制方式配置
// 发送方：服务器
// 接收者：自定义客户端
// 最高QoS等级：1
// 发送频率：1Hz
message RobotPerformanceSelectionSync {
  uint32 shooter = 1; // 当前发射机构性能体系，枚举值同RobotPerformanceSelectionCommand的shooter字段
  uint32 chassis = 2; // 当前底盘性能体系，枚举值同RobotPerformanceSelectionCommand的chassis字段
  uint32 sentry_control = 3; // 当前哨兵控制方式，枚举值同RobotPerformanceSelectionCommand的sentry_control字段
}

// 24. 机器人通用指令（CommonCommand）
// 用途：自定义客户端向服务器发送机器人补弹、复活等常用操作指令
// 发送方：自定义客户端
// 接收者：服务器
// 最高QoS等级：1
// 发送频率：触发式，最高10Hz
message CommonCommand {
  uint32 cmd_type = 1; // 命令类型，枚举值：
                       // 1=兑换17mm发弹量（参数为10的倍数，金币足够时生效）
                       // 2=兑换42mm发弹量（金币足够时生效）
                       // 3=确认复活（读条完成后立即复活）
                       // 4=兑换立即复活（金币足够、符合规则时生效）
                       // 5=远程兑换允许发弹量（金币足够、符合规则时生效）
                       // 6=远程兑换血量（金币足够、符合规则时生效）
  uint32 param = 2; // 命令参数，随cmd_type变化（如兑换17mm发弹量时为兑换发数）
}

// 25. 英雄部署模式指令（HeroDeployModeEventCommand）
// 用途：自定义客户端向服务器发送英雄机器人的部署模式切换指令
// 发送方：自定义客户端
// 接收者：服务器
// 最高QoS等级：1
// 发送频率：1Hz
message HeroDeployModeEventCommand {
  uint32 mode = 1; // 部署模式，枚举值：0=退出部署模式（恢复正常移动/射击状态），1=进入部署模式（切换为狙击/防御状态）
}

// 26. 英雄部署模式状态同步（DeployModeStatusSync）
// 用途：服务器向自定义客户端同步英雄机器人的当前部署模式状态
// 发送方：服务器
// 接收者：自定义客户端
// 最高QoS等级：1
// 发送频率：1Hz
message DeployModeStatusSync {
  uint32 current_status = 1; // 当前部署模式状态，枚举值：0=未部署（正常状态），1=已部署（狙击/防御状态）
}

// 27. 能量机关激活指令（RuneActivateCommand）
// 用途：自定义客户端向服务器发送能量机关的激活指令
// 发送方：自定义客户端
// 接收者：服务器
// 最高QoS等级：1
// 发送频率：1Hz
message RuneActivateCommand {
  uint32 activate = 1; // 激活控制：1=开启能量机关激活流程，0=取消激活（仅未开始激活时有效）
}

// 28. 能量机关状态同步（RuneStatusSync）
// 用途：服务器向自定义客户端同步能量机关的当前状态
// 发送方：服务器
// 接收者：自定义客户端
// 最高QoS等级：1
// 发送频率：1Hz
message RuneStatusSync {
  uint32 rune_status = 1; // 能量机关状态，枚举值：1=未激活（初始状态，未触发激活），2=正在激活（激活流程中），3=已激活（激活成功，增益生效）
  uint32 activated_arms = 2; // 当前已激活的灯臂数量（能量机关共6个灯臂，0~6）
  uint32 average_rings = 3; // 激活过程的平均环数（用于计算激活增益强度，0~100）
}

// 29. 哨兵状态同步（SentryStatusSync）
// 用途：服务器向自定义客户端同步哨兵机器人的姿态和弱化状态
// 发送方：服务器
// 接收者：自定义客户端
// 最高QoS等级：1
// 发送频率：1Hz
message SentryStatusSync {
  uint32 posture_id = 1; // 哨兵当前姿态ID，枚举值：1=进攻姿态（优先攻击敌方机器人），2=防御姿态（优先守护己方基地/前哨站），3=移动姿态（优先转移位置）
  bool is_weakened = 2; // 哨兵是否处于弱化状态：false=正常状态（无弱化），true=弱化状态（属性下降，如伤害降低、防御下降）
}

// 30. 飞镖控制指令（DartCommand）
// 用途：自定义客户端向服务器发送飞镖机器人的控制指令
// 发送方：自定义客户端
// 接收者：服务器
// 最高QoS等级：1
// 发送频率：1Hz
message DartCommand {
  uint32 target_id = 1; // 飞镖击打目标ID，枚举值：1=前哨站，2=基地固定目标，3=基地随机固定目标，4=基地随机移动目标，5=基地末端移动目标
  bool open = 2; // 飞镖闸门开关状态：true=开启（允许发射飞镖），false=关闭（禁止发射飞镖）
  bool launch_confirm = 3; // 飞镖发射确认：false=未确认，true=确认发射（触发飞镖发射）
}

// 31. 飞镖目标选择状态同步（DartSelectTargetStatusSync）
// 用途：服务器向自定义客户端同步飞镖机器人的目标选择和闸门状态
// 发送方：服务器
// 接收者：自定义客户端
// 最高QoS等级：1
// 发送频率：1Hz
message DartSelectTargetStatusSync {
  uint32 target_id = 1; // 当前选中的飞镖击打目标ID，枚举值同DartCommand的target_id字段
  uint32 open = 2; // 当前飞镖闸门状态，枚举值：0=已开启，1=关闭，2=正在开启/关闭中（协议表1-19定义）
}

// 32. 哨兵控制指令请求（SentryCtrlCommand）
// 用途：自定义客户端向服务器发送哨兵机器人的控制指令请求
// 发送方：自定义客户端
// 接收者：服务器
// 最高QoS等级：1
// 发送频率：1Hz
message SentryCtrlCommand {
  uint32 command_id = 1; // 指令编号，枚举值：
                         // 0 = 无效指令（忽略）
                         // 1 = 补血点补弹（前往补血点补充弹药）
                         // 2 = 补给站实体补弹（前往补给站实体补充弹药）
                         // 3 = 远程补弹（消耗金币兑换远程补弹）
                         // 4 = 远程回血（消耗金币兑换远程补血）
                         // 5 = 确认复活（确认免费复活，读条完成后复活）
                         // 6 = 确认花费金币复活（消耗金币立即复活）
                         // 7 = 地图标点（在小地图标记目标点）
                         // 8 = 切换为进攻姿态（切换至进攻姿态）
                         // 9 = 切换为防御姿态（切换至防御姿态）
                         // 10 = 切换为移动姿态（切换至移动姿态）
}

// 33. 哨兵控制指令结果反馈（SentryCtrlResult）
// 用途：服务器向自定义客户端反馈哨兵控制指令的执行结果
// 发送方：服务器
// 接收者：自定义客户端
// 最高QoS等级：1
// 发送方式：触发式发送（指令执行后立即反馈）
message SentryCtrlResult {
  uint32 command_id = 1; // 对应的指令编号（与SentryCtrlCommand的command_id一致）
  uint32 result_code = 2; // 执行结果码：0=成功（指令正常执行），其他值=失败（具体失败原因参考赛事日志）
}

// 34. 空中支援指令（AirSupportCommand）
// 用途：自定义客户端向服务器发送空中支援的控制指令
// 发送方：自定义客户端
// 接收者：服务器
// 最高QoS等级：1
// 发送频率：1Hz
message AirSupportCommand {
  uint32 command_id = 1; // 指令类型，枚举值：
                         // 1 = 免费呼叫空中支援（使用免费支援次数）
                         // 2 = 花费金币呼叫空中支援（优先使用免费次数，无免费次数时消耗金币）
                         // 3 = 中断空中支援（终止当前正在进行的空中支援）
}

// 35. 空中支援状态反馈（AirSupportStatusSync）
// 用途：服务器向自定义客户端同步空中支援的当前状态
// 发送方：服务器
// 接收者：自定义客户端
// 最高QoS等级：1
// 发送频率：1Hz
message AirSupportStatusSync {
  uint32 airsupport_status = 1; // 空中支援状态，枚举值：
                                // 0 = 未进行空中支援（初始状态/支援结束）
                                // 1 = 正在空中支援（支援流程中，持续造成伤害/增益）
  uint32 left_time = 2; // 免费空中支援剩余时间（单位：秒），0表示无免费支援时间
  uint32 cost_coins = 3; // 付费空中支援已花费的金币总数（单位：金币）
  uint32 is_being_targeted = 4; // 激光检测模块是否被照射：0=未被照射，1=被照射
  uint32 shooter_status = 5; // 空中机器人发射机构反制状态：0=被雷达反制锁定（无法发射），1=正常未锁定（协议2.2.35定义）
}